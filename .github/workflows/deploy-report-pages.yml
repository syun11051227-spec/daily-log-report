# 週次レポート HTML をビルドし、GitHub Pages で公開する。
#
# 事前設定（リポジトリ Settings）:
#   1. Settings → Secrets and variables → Actions
#      - GOOGLE_SHEETS_SPREADSHEET_ID … スプレッドシート ID（文字列）
#      - GOOGLE_SERVICE_ACCOUNT_JSON … サービスアカウント鍵 JSON の全文
#   2. Google Cloud: サービスアカウントを作成し JSON をダウンロード。
#      スプレッドシートをその SA のメール（...iam.gserviceaccount.com）に共有（閲覧で可）。
#   3. Settings → Pages → Build and deployment → Source: 「GitHub Actions」
#   4. 初回のみ Settings → Environments → github-pages があればそのまま利用
#
# 公開 URL の例: https://<ユーザー名>.github.io/<リポジトリ名>/
#
# ローカルから oauth2.googleapis.com に繋がらない場合: Actions → 本ワークフロー → Run workflow。
# 成功後は Pages の URL、または run 画面下部の Artifacts「week-report-html」ZIP で HTML を取得できる。
#
# スケジュール: 毎日 17:00 UTC = 日本時間 翌日 02:00（JST・UTC+9）。GitHub cron は UTC のみ。
# 中国時間 02:00 にしたい場合は "0 18 * * *"（前日 18:00 UTC = 翌 02:00 CST）に変更。
name: Deploy weekly report to Pages

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r report_pipeline/requirements.txt

      - name: Generate report HTML
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p public
          python report_pipeline/generate_week_report.py -o public/index.html

      - name: Upload HTML artifact (Actions から ZIP 取得可)
        uses: actions/upload-artifact@v4
        with:
          name: week-report-html
          path: public/index.html
          if-no-files-found: error

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
