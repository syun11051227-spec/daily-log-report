      from { transform: translateY(100%); }
      to   { transform: translateY(0); }

    @keyframes sheetSlideDown {

let currentDate = TODAY;

function shiftDate(d, n) {
  const dt = new Date(d + 'T00:00:00');
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().slice(0, 10);
}
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  const dows = ['日','月','火','水','木','金','土'];
  const m = dt.getMonth()+1, day = dt.getDate(), dow = dows[dt.getDay()];
  return `${m}月${day}日（${dow}）${d === TODAY ? '　今日' : ''}`;
}
function fmtShort(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function fmtRelDate(d) {
  const diff = Math.round((new Date(TODAY) - new Date(d)) / 86400000);
  if (diff === 0) return '今日';
  if (diff === 1) return '昨日';
  if (diff < 7)  return `${diff}日前`;
  if (diff < 14) return '1週間前';
  return `${Math.round(diff/7)}週間前`;
}

function calcVol(sets, isSec) {
  if (isSec) return null;
  return sets.reduce((s,{w,r}) => s + w*r, 0);
}
function totalVol(wo)  { return wo.exercises.reduce((s,ex) => s + (calcVol(ex.sets, ex.isSeconds)||0), 0); }
function totalSets(wo) { return wo.exercises.reduce((s,ex) => s + ex.sets.length, 0); }
function maxWeight(sets) { return Math.max(...sets.map(s => s.w)); }

function calcStreak() {
  let streak = 0, d = TODAY;
  while (d >= MIN_DATE) {
    if (WO[d]) streak++; else break;
    d = shiftDate(d, -1);
  }
  return streak;
}

// 種目名 → 全セッション（古い順）
function getExSessions(name) {
  return Object.entries(WO)
    .filter(([,wo]) => wo.exercises.some(ex => ex.name === name))
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([date, wo]) => {
      const ex = wo.exercises.find(e => e.name === name);
      const mw = ex.isSeconds ? null : maxWeight(ex.sets.filter(s => s.w > 0));
      return { date, ex, maxW: (mw && mw > 0) ? mw : null, vol: calcVol(ex.sets, ex.isSeconds) };
    });
}

// 全種目を筋肉部位別に集約
function getAllExByMuscle() {
  const map = new Map();
  Object.entries(WO).sort(([a],[b]) => a.localeCompare(b)).forEach(([date,wo]) => {
    wo.exercises.forEach(ex => {
      if (!map.has(ex.name)) map.set(ex.name, { muscle: ex.muscle, isSeconds: ex.isSeconds, sessions:[] });
      map.get(ex.name).sessions.push({ date, sets: ex.sets });
    });
  });
  const grouped = {};
  map.forEach((v, name) => {
    if (!grouped[v.muscle]) grouped[v.muscle] = [];
    const sessions = v.sessions;
    const last = sessions[sessions.length - 1];
    const bestW = v.isSeconds ? null
      : Math.max(...sessions.flatMap(s => s.sets.map(x => x.w)).filter(w => w > 0), 0) || null;
    grouped[v.muscle].push({ name, muscle: v.muscle, isSeconds: v.isSeconds,
      sessionCount: sessions.length, bestW, lastDate: last.date });
  });
  return grouped;
}

function buildCalendar(year, month) {
  const firstDow    = (new Date(year, month-1, 1).getDay()+6) % 7;
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = [...Array(firstDow).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while (cells.length % 7) cells.push(null);

  const hdrs = ['月','火','水','木','金','土','日'].map(h =>
    `<div style="text-align:center;font-size:0.72rem;font-weight:600;color:rgba(60,60,67,0.42);padding:0.3rem 0">${h}</div>`
  ).join('');

  const cellHtml = cells.map(d => {
    if (!d) return `<div></div>`;
    const ds  = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wo  = WO[ds];
    const isToday  = ds === TODAY;
    const isFuture = ds > TODAY;
    const col = wo ? (C[wo.type] || C['全身']) : null;

    let wrapStyle = 'display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;padding:0.32rem 0;gap:3px;';
    let numStyle  = 'font-size:0.88rem;line-height:1;';
    if (isToday)       { wrapStyle += 'background:#007aff;'; numStyle += 'font-weight:700;color:#fff;'; }
    else if (isFuture) { numStyle += 'font-weight:400;color:rgba(60,60,67,0.22);'; }
    else if (wo)       { numStyle += 'font-weight:700;color:#000;'; }
    else               { numStyle += 'font-weight:400;color:rgba(60,60,67,0.38);'; }

    const dot = col
      ? `<div style="width:5px;height:5px;border-radius:50%;background:${isToday ? 'rgba(255,255,255,0.85)' : col.dot}"></div>`
      : '';
    const clickable = wo || isToday;
    return `
<div class="${clickable?'cal-day-btn':''}" style="${wrapStyle}"
     ${clickable ? `onclick="gotoDate('${ds}')" role="button" tabindex="0"` : ''}>
  <span style="${numStyle}">${d}</span>${dot}
</div>`;
  }).join('');

  const woCount = cells.filter(d => {
    if (!d) return false;
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return !!WO[ds] && ds <= TODAY;
  }).length;

  return `
<section class="mb-3 rounded-[14px] bg-white overflow-hidden" style="box-shadow:0 0.5px 0 rgba(60,60,67,0.12)">
  <div class="px-4 pt-4 pb-3">
    <div class="flex items-baseline justify-between mb-3">
      <span style="font-size:1rem;font-weight:700">${year}年${month}月</span>
      <span style="font-size:0.82rem;font-weight:600;color:rgba(60,60,67,0.55)">${woCount} 回 トレーニング</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${hdrs}
      ${cellHtml}
    </div>
  </div>
</section>`;
}

// ── 重量推移 SVG チャート ─────────────────────────────────

function buildProgressChart(sessions) {
  const W = 320, H = 130;
  const L = 42, R = 12, T = 18, B = 26;
  const cW = W - L - R, cH = H - T - B;

  const weights  = sessions.map(s => s.maxW);
  const rawMax   = Math.max(...weights);
  const rawMin   = Math.min(...weights);
  const range    = rawMax - rawMin || rawMax * 0.1 || 10;
  const yMin     = Math.max(0, rawMin - range * 0.5);
  const yMax     = rawMax + range * 0.5;
  const yRange   = yMax - yMin;

  const xOf = i  => L + (sessions.length === 1 ? cW/2 : (i/(sessions.length-1)) * cW);
  const yOf = w  => T + cH - ((w - yMin) / yRange) * cH;

  const pts     = sessions.map((s,i) => ({ x: xOf(i), y: yOf(s.maxW), w: s.maxW, date: s.date }));
  const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
  const pbY      = yOf(rawMax);

  // グリッド（min/max 水平線）
  const gridHtml = `
    <line class="axis-base" x1="${L}" y1="${T+cH}" x2="${W-R}" y2="${T+cH}" />
    <line class="pb-line"   x1="${L}" y1="${pbY}"   x2="${W-R}" y2="${pbY}"  opacity="0.55" />`;

  // Y ラベル
  const yLabels = (() => {
    const niceW = v => Number.isInteger(v) ? String(v) : v.toFixed(1);
    let out = `<text x="${L-5}" y="${yOf(rawMin)+4}" text-anchor="end" style="font-size:0.64rem;fill:rgba(60,60,67,0.42);font-weight:600">${niceW(rawMin)}</text>`;
    if (rawMax !== rawMin)
      out += `<text x="${L-5}" y="${yOf(rawMax)+4}" text-anchor="end" style="font-size:0.64rem;fill:#ff2d55;font-weight:700">${niceW(rawMax)}</text>`;
    return out;
  })();

  // データ点・ラベル
  const dotsHtml = pts.map((p, i) => {
    const isPB   = p.w === rawMax;
    const isLast = i === pts.length - 1;
    const r      = isPB ? 5 : 4;
    const fill   = isPB ? '#ff2d55' : '#007aff';
    const showLabel = isPB || isLast || i === 0;
    const anchor = i === 0 ? 'start' : i === pts.length-1 ? 'end' : 'middle';
    const niceW  = Number.isInteger(p.w) ? String(p.w) : p.w.toFixed(1);
    return `
      <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" />
      ${showLabel ? `<text x="${p.x}" y="${p.y-8}" text-anchor="${anchor}" style="font-size:0.68rem;fill:${isPB?'#ff2d55':'#007aff'};font-weight:700">${niceW}</text>` : ''}`;
  }).join('');

  // X 日付ラベル
  const dateLabels = pts.map((p, i) => {
    const show = i === 0 || i === pts.length-1 || (pts.length >= 4 && i === Math.floor(pts.length/2));
    const anchor = i === 0 ? 'start' : i === pts.length-1 ? 'end' : 'middle';
    return show
      ? `<text x="${p.x}" y="${H-3}" text-anchor="${anchor}" style="font-size:0.64rem;fill:rgba(60,60,67,0.42);font-weight:600">${fmtShort(p.date)}</text>`
      : '';
  }).join('');

  return `<svg class="prog-chart" viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible" role="img" aria-label="重量推移チャート">
  ${gridHtml}
  <polyline points="${polyline}" />
  ${dotsHtml}
  ${dateLabels}
  ${yLabels}
</svg>`;
}

// ── セッション別リスト ────────────────────────────────────

function buildExSessionList(sessions) {
  const sorted = [...sessions].sort((a,b) => b.date.localeCompare(a.date));
  const allMaxW = sessions.map(s => s.maxW).filter(Boolean);
  const globalPB = allMaxW.length ? Math.max(...allMaxW) : null;

  const rows = sorted.map((sess, i) => {
    const ex  = sess.ex;
    const dt  = new Date(sess.date + 'T00:00:00');
    const dows = ['日','月','火','水','木','金','土'];
    const dateLabel = `${dt.getMonth()+1}月${dt.getDate()}日（${dows[dt.getDay()]}）`;
    const relLabel  = fmtRelDate(sess.date);
    const sessMaxW  = sess.maxW;
    const isPBsess  = globalPB !== null && sessMaxW === globalPB;

    const setRows = ex.sets.map((s, si) => {
      const isBestSet = !ex.isSeconds && s.w === sessMaxW && sessMaxW !== null;
      const wLabel = s.w === 0 ? (ex.isSeconds ? '―' : '自重') : `${s.w} kg`;
      const rLabel = ex.isSeconds ? `${s.r} 秒` : `${s.r} 回`;
      return `
<div style="display:grid;grid-template-columns:2rem 1fr auto auto;align-items:center;padding:0.42rem 1rem;${si < ex.sets.length-1 ? 'border-bottom:1px solid rgba(60,60,67,0.06)' : ''}">
  <span style="font-size:0.76rem;font-weight:700;color:rgba(60,60,67,0.35);font-variant-numeric:tabular-nums">${si+1}</span>
  <span style="font-size:0.9rem;font-weight:600;font-variant-numeric:tabular-nums;color:${isBestSet?'#007aff':'#000'}">${wLabel}</span>
  <span style="font-size:0.82rem;font-weight:500;color:rgba(60,60,67,0.55);font-variant-numeric:tabular-nums;margin-right:0.4rem">× ${rLabel}</span>
  ${isBestSet ? `<span style="font-size:0.68rem;font-weight:700;color:#007aff;background:rgba(10,132,255,0.1);border-radius:4px;padding:0.05rem 0.3rem">最高</span>` : '<span></span>'}
</div>`;
    }).join('');

    const volStr = sess.vol
      ? (sess.vol >= 1000 ? (sess.vol/1000).toFixed(1)+' t' : sess.vol.toLocaleString()+' kg')
      : null;

    const sep = i > 0 ? `<div style="height:6px;background:#f2f2f7"></div>` : '';

    return `
${sep}
<div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem 0.3rem;background:rgba(60,60,67,0.025)">
    <div style="display:flex;align-items:center;gap:0.5rem">
      <span style="font-size:0.9rem;font-weight:700">${dateLabel}</span>
      <span style="font-size:0.76rem;color:rgba(60,60,67,0.45)">${relLabel}</span>
      ${isPBsess ? `<span style="font-size:0.68rem;font-weight:700;color:#ff2d55;background:rgba(255,45,85,0.1);border-radius:4px;padding:0.05rem 0.3rem">PB 🏆</span>` : ''}
    </div>
    ${volStr ? `<span style="font-size:0.78rem;font-weight:600;color:rgba(60,60,67,0.4)">${volStr}</span>` : ''}
  </div>
  <div style="display:grid;grid-template-columns:2rem 1fr auto auto;padding:0.24rem 1rem;background:rgba(60,60,67,0.04)">
    <span style="font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(60,60,67,0.35)">SET</span>
    <span style="font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(60,60,67,0.35)">重量</span>
    <span style="font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(60,60,67,0.35);margin-right:0.4rem">回数</span>
    <span></span>
  </div>
  ${setRows}
</div>`;
  }).join('');

  return `
<section>
  <div class="px-1 mb-2 text-[0.78rem] font-semibold uppercase tracking-wide"
       style="color:rgba(60,60,67,0.5)">セッション履歴</div>
  <div class="rounded-[14px] bg-white overflow-hidden"
       style="box-shadow:0 0.5px 0 rgba(60,60,67,0.12)">${rows}</div>
</section>`;
}

// ── 週間メニューグリッド ────────────────────────────────────
function buildWeekGrid() {
  const start  = new Date(WEEKLY_PLAN.weekStart + 'T00:00:00');
  const dows   = ['月','火','水','木','金','土','日'];
  const days   = Array.from({length:7}, (_,i) => {
    const dt = new Date(start); dt.setDate(dt.getDate() + i);
    return dt.toISOString().slice(0,10);
  });

  const cols = days.map((ds, i) => {
    const plan    = WEEKLY_PLAN.days[ds];
    const done    = !!WO[ds];
    const isToday = ds === TODAY;
    const isFuture = ds > TODAY;
    const isSel   = ds === selectedMenuDate && !!plan;
    const col     = plan ? (C[plan.type] || C['全身']) : null;
    const dayLabel = dows[i];

    // 部位を2文字に省略
    const typeShort = plan
      ? plan.type.split('・')[0].slice(0,2)
      : '';

    let cellBg = 'transparent';
    let labelColor = 'rgba(60,60,67,0.35)';
    let badgeBg = 'transparent', badgeText = 'rgba(60,60,67,0.3)';
    let border = '';

    if (isSel) {
      border = `box-shadow:inset 0 0 0 2px ${col.dot};border-radius:10px;`;
    }

    if (plan) {
      badgeBg   = col.bg;
      badgeText = col.text;
      labelColor = '#000';
    }

    const statusIcon = done
      ? `<span style="font-size:0.7rem;color:#34c759;font-weight:700">✓</span>`
      : isToday && plan
      ? `<span style="font-size:0.65rem;color:#007aff;font-weight:700">今日</span>`
      : plan && isFuture
      ? `<span style="font-size:0.7rem;color:rgba(60,60,67,0.3)">●</span>`
      : `<span style="font-size:0.7rem;color:rgba(60,60,67,0.2)">―</span>`;

    const clickable = !!plan;
    return `
<div ${clickable ? `onclick="selectMenuDay('${ds}')"` : ''}
     style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:0.4rem 0.15rem;border-radius:10px;${border}cursor:${clickable?'pointer':'default'};-webkit-tap-highlight-color:transparent;">
  <span style="font-size:0.72rem;font-weight:600;color:rgba(60,60,67,0.45)">${dayLabel}</span>
  ${plan
    ? `<span style="font-size:0.7rem;font-weight:700;border-radius:6px;padding:0.15rem 0.3rem;background:${badgeBg};color:${badgeText};line-height:1.2;text-align:center">${typeShort}</span>`
    : `<span style="font-size:0.7rem;color:rgba(60,60,67,0.2)">休</span>`}
  ${statusIcon}
</div>`;
  }).join('');

  return `
<section class="mb-3 rounded-[14px] bg-white overflow-hidden" style="box-shadow:0 0.5px 0 rgba(60,60,67,0.12)">
  <div class="px-3 pt-3 pb-2">
    <div class="flex items-center justify-between mb-2">
      <span style="font-size:0.82rem;font-weight:700">週間プラン</span>
      <span style="font-size:0.72rem;color:rgba(60,60,67,0.45)">日をタップで詳細表示</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cols}</div>
  </div>
</section>`;
}

  const dateLabel = `${dt.getMonth()+1}月${dt.getDate()}日（${dows[dt.getDay()]}）${ds === TODAY ? '　今日' : ''}`;
  const col    = C[plan.type] || C['全身'];
  const wo     = WO[ds];
  const done   = !!wo;
  const isFuture = ds > TODAY;

  const statusBadge = done
    ? `<span style="font-size:0.75rem;font-weight:700;border-radius:999px;padding:0.15rem 0.6rem;background:rgba(52,199,89,0.12);color:#1a8c34">実施済 ✓</span>`

    <span style="font-size:0.66rem;font-weight:700;text-transform:uppercase;color:rgba(60,60,67,0.4)">実績</span>
    <span style="font-size:0.7rem;font-weight:700;color:${achieved?'#34c759':'#ff9500'}">${achieved?'✓ 目標達成':'△ 途中'}</span>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:2px">${setTags}</div>
</div>`;
    }

    const noteHtml = t.note
      ? `<div style="margin-top:0.35rem;font-size:0.78rem;color:rgba(60,60,67,0.55);line-height:1.45;border-left:2px solid rgba(10,132,255,0.35);padding-left:0.4rem">${t.note}</div>`
      : '';

    return `

  <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.25rem">
    <span style="font-size:0.93rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</span>
    <span style="font-size:0.78rem;font-weight:600;color:rgba(60,60,67,0.5);flex-shrink:0;white-space:nowrap">${t.sets}セット × ${t.reps} @ ${t.weight}</span>

  const feedbackHtml = done ? buildMenuFeedback(ds) : '';

  return `

  setTimeout(() => {
    const el = document.querySelector('#menu-content section:nth-child(3)');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// ══════════════════════════════════════════════════════════
//  インタラクション
// ══════════════════════════════════════════════════════════

function gotoDate(dateStr) {
  currentDate = dateStr;
  switchTab('log');
  renderLog();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function switchTab(name) {
  ['log','menu','history'].forEach(v => {
    const tab   = document.getElementById(`tab-${v}`);
    const panel = document.getElementById(`view-${v}`);
    const active = v === name;
    tab.setAttribute('aria-selected', active ? 'true' : 'false');
    tab.style.color = active ? '#000' : 'rgba(60,60,67,0.6)';
    panel.classList.toggle('hidden', !active);
  });
  if (name === 'history') renderHistory();
  if (name === 'menu')    renderMenu();
}

document.getElementById('prev-day').addEventListener('click', () => {
  const d = shiftDate(currentDate, -1);
  if (d >= MIN_DATE) { currentDate = d; renderLog(); }
});
document.getElementById('next-day').addEventListener('click', () => {
  const d = shiftDate(currentDate, 1);
  if (d <= TODAY) { currentDate = d; renderLog(); }
});
document.getElementById('tab-log').addEventListener('click',     () => switchTab('log'));
document.getElementById('tab-menu').addEventListener('click',    () => switchTab('menu'));
document.getElementById('tab-history').addEventListener('click', () => switchTab('history'));

// Escape キーでオーバーレイを閉じる
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeExDetail(); });

renderLog();
</script>
